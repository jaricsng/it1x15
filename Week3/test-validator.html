<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="storyForm.css"> -->
</head>

<body>

    <form action="ack-storyform.html" method="get">
        <fieldset>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email"
                title="Please enter a valid email address (e.g., user@example.com)" required><br>

            <label for="contact">Contact Number:</label>
            <input type="tel" id="contact" name="contact" required title="8 digits telelphone number"
                pattern="[1-9]\d{7}" inputmode="numeric" maxlength="8">
        </fieldset>
        <fieldset>
            <label for="website">Favourite website:</label>
            <input type="url" id="website" name="website" placeholder="https://www.google.com" pattern="https://.*"
                required><br>
        </fieldset>
        <input type="submit" value="Submit">
    </form>

</body>

</html>
